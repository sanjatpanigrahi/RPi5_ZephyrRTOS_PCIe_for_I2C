# --- Core kernel/RTOS ---
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# --- Logging ---
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=3

# --- Console / UART ---
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# --- PCIe host stack ---
# Root complex support
CONFIG_PCIE=y

# Enable PCIe *controller* drivers (brcmstb driver is selected automatically
# when the brcm,brcmstb-pcie node is present in DTS)
CONFIG_PCIE_CONTROLLER=y

# Optional: MSI support (you can comment this out if it causes issues)
CONFIG_PCIE_MSI=y

# --- I2C framework ---
CONFIG_I2C=y

# Let Zephyr use the default init priority for I2C, it's fine for now.
# If you really want to override it:
# CONFIG_I2C_INIT_PRIORITY=60

# --- Basic debug/sanity ---
CONFIG_ASSERT=y
CONFIG_PRINTK=y



